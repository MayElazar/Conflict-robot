<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="default"/>
<title>Angel · Sculpture Control</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,wght@0,300;0,400;0,500;1,300&display=swap" rel="stylesheet">
<style>
  :root {
    --bg:       #0E0C0A;
    --surface:  #1A1713;
    --border:   #2E2A24;
    --text:     #F0EDE8;
    --muted:    #7A7368;
    --amber:    #D4820A;
    --amber-lt: rgba(212,130,10,0.12);
    --green:    #3A7D5B;
    --red:      #C0392B;
  }
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html, body {
    height: 100%;
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Sans', -apple-system, sans-serif;
    -webkit-font-smoothing: antialiased;
    overflow: hidden;
  }

  /* ── Background petals ── */
  .bg-canvas {
    position: fixed; inset: 0; z-index: 0;
    pointer-events: none; overflow: hidden;
  }
  .petal {
    position: absolute;
    border-radius: 50% 0 50% 0;
    opacity: 0;
    animation: drift linear infinite;
  }
  @keyframes drift {
    0%   { transform: translateY(110vh) rotate(0deg);   opacity: 0; }
    5%   { opacity: .18; }
    95%  { opacity: .06; }
    100% { transform: translateY(-20vh) rotate(720deg); opacity: 0; }
  }

  /* ── Main card ── */
  .card {
    position: relative; z-index: 1;
    min-height: 100vh;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    padding: 2rem 1.5rem;
    text-align: center;
  }

  /* flower icon */
  .flower {
    font-size: 56px;
    margin-bottom: 1.5rem;
    animation: bloom-pulse 3s ease-in-out infinite;
    filter: drop-shadow(0 0 24px rgba(212,130,10,.4));
  }
  @keyframes bloom-pulse {
    0%,100% { transform: scale(1);    filter: drop-shadow(0 0 20px rgba(212,130,10,.35)); }
    50%      { transform: scale(1.08); filter: drop-shadow(0 0 36px rgba(212,130,10,.6)); }
  }

  h1 {
    font-size: 28px; font-weight: 500; letter-spacing: -.01em;
    margin-bottom: .4rem;
  }
  h1 em { font-style: italic; font-weight: 300; color: var(--amber); }

  .subtitle {
    font-size: 14px; color: var(--muted);
    margin-bottom: 2.5rem; line-height: 1.6; max-width: 260px;
  }

  /* ── Progress ring ── */
  .ring-wrap {
    position: relative; width: 72px; height: 72px;
    margin-bottom: 1rem;
  }
  .ring-wrap svg { width: 72px; height: 72px; transform: rotate(-90deg); }
  .ring-track { fill: none; stroke: var(--border); stroke-width: 4; }
  .ring-fill  {
    fill: none; stroke: var(--amber); stroke-width: 4;
    stroke-linecap: round;
    stroke-dasharray: 188;
    stroke-dashoffset: 188;
    transition: stroke-dashoffset .4s ease;
  }
  .ring-icon {
    position: absolute; top: 50%; left: 50%;
    transform: translate(-50%,-50%);
    font-size: 24px;
  }

  /* connecting label */
  .status-label {
    font-size: 13px; color: var(--muted);
    margin-bottom: 2rem; letter-spacing: .02em;
    min-height: 1.4em;
  }
  .status-label.err { color: var(--red); }
  .status-label.ok  { color: var(--green); }

  /* manual IP fallback */
  .fallback {
    display: none;
    flex-direction: column; align-items: center; gap: .6rem;
    width: 100%; max-width: 300px;
    animation: fadein .3s ease;
  }
  .fallback.show { display: flex; }
  @keyframes fadein { from { opacity:0; transform:translateY(8px); } to { opacity:1; transform:none; } }

  .fallback-label { font-size: 12px; color: var(--muted); }
  .fallback input {
    width: 100%;
    padding: 12px 16px;
    font-size: 15px; font-family: inherit;
    border: 1px solid var(--border);
    border-radius: 12px;
    background: var(--surface); color: var(--text);
    text-align: center; outline: none;
    transition: border-color .2s;
  }
  .fallback input:focus { border-color: var(--amber); }
  .fallback-btn {
    width: 100%;
    padding: 13px;
    font-size: 14px; font-weight: 500; font-family: inherit;
    background: var(--amber); color: #fff;
    border: none; border-radius: 12px;
    cursor: pointer; transition: opacity .15s, transform .1s;
  }
  .fallback-btn:active { opacity: .85; transform: scale(.98); }
  .hint {
    font-size: 11px; color: var(--muted); margin-top: .5rem;
    line-height: 1.7; max-width: 260px;
  }

  /* retry link */
  .retry {
    margin-top: 1.25rem;
    font-size: 12px; color: var(--muted);
    cursor: pointer; text-decoration: underline;
    text-underline-offset: 3px;
  }
</style>
</head>
<body>

<!-- Floating petals -->
<div class="bg-canvas" id="bgCanvas"></div>

<div class="card">
  <div class="flower">🌸</div>
  <h1>Angel <em>sculpture</em></h1>
  <p class="subtitle">Connecting to Angel sculpture…</p>

  <!-- Progress ring -->
  <div class="ring-wrap" id="ringWrap">
    <svg viewBox="0 0 60 60">
      <circle class="ring-track" cx="30" cy="30" r="26"/>
      <circle class="ring-fill" id="ringFill" cx="30" cy="30" r="26"/>
    </svg>
    <span class="ring-icon" id="ringIcon">🌿</span>
  </div>

  <p class="status-label" id="statusLabel">Connecting to 172.20.10.10…</p>

  <!-- Fallback: manual IP -->
  <div class="fallback" id="fallback">
    <p class="fallback-label">Enter the IP from Serial Monitor instead:</p>
    <input type="text" id="ipInput" placeholder="e.g. 172.20.10.4" inputmode="decimal"/>
    <button class="fallback-btn" onclick="connectManual()">Connect →</button>
    <p class="hint">
      Make sure your phone is connected to the <strong>same hotspot</strong> as the Arduino.
    </p>
  </div>

  <p class="retry" id="retryBtn" style="display:none" onclick="startConnect()">Try again</p>
</div>

<script>
  // ── Petals ─────────────────────────────────────────────────
  const colors = ['#D4820A','#C0701A','#E8A44A','#7B5EA7','#A07BC0'];
  const canvas = document.getElementById('bgCanvas');
  for (let i = 0; i < 18; i++) {
    const p = document.createElement('div');
    p.className = 'petal';
    const size = 10 + Math.random() * 22;
    p.style.cssText = `
      width:${size}px; height:${size}px;
      left:${Math.random()*100}%;
      background:${colors[Math.floor(Math.random()*colors.length)]};
      animation-duration:${8+Math.random()*14}s;
      animation-delay:${-Math.random()*20}s;
    `;
    canvas.appendChild(p);
  }

  // ── Ring progress animation ─────────────────────────────────
  const DASH = 188;
  let ringProgress = 0;
  let ringInterval = null;

  function animateRing() {
    ringInterval = setInterval(() => {
      ringProgress = Math.min(ringProgress + 2, 85);
      document.getElementById('ringFill').style.strokeDashoffset =
        DASH - (ringProgress / 100) * DASH;
    }, 40);
  }

  function completeRing(success) {
    clearInterval(ringInterval);
    const fill = document.getElementById('ringFill');
    fill.style.stroke = success ? '#3A7D5B' : '#C0392B';
    fill.style.strokeDashoffset = success ? 0 : DASH;
    document.getElementById('ringIcon').textContent = success ? '✓' : '✕';
  }

  // ── Status helpers ──────────────────────────────────────────
  function setLabel(msg, cls) {
    const el = document.getElementById('statusLabel');
    el.textContent = msg;
    el.className = 'status-label' + (cls ? ' ' + cls : '');
  }

  // ── Connect ─────────────────────────────────────────────────
  //
  // Strategy: navigate to http://angel.local
  // This is a top-level browser navigation (not a fetch),
  // so it is NOT blocked by mixed-content rules.
  // The Arduino serves the full control app at that address.
  //
  function goTo(host) {
    window.location.href = 'http://' + host;
  }

  async function startConnect() {
    ringProgress = 0;
    document.getElementById('ringFill').style.stroke = 'var(--amber)';
    document.getElementById('ringFill').style.strokeDashoffset = DASH;
    document.getElementById('ringIcon').textContent = '🌿';
    document.getElementById('fallback').classList.remove('show');
    document.getElementById('retryBtn').style.display = 'none';
    setLabel('Connecting to 172.20.10.10…');
    animateRing();

    // Give the ring a moment to animate, then navigate
    await new Promise(r => setTimeout(r, 1200));
    setLabel('Connecting…');
    await new Promise(r => setTimeout(r, 600));

    // Navigate — the browser will load http://angel.local
    // If the Arduino is up, the control app loads.
    // If not reachable, the browser shows its own "can't connect" page.
    setLabel('Opening sculpture control…', 'ok');
    completeRing(true);

    await new Promise(r => setTimeout(r, 500));
    goTo('172.20.10.10');  // fixed static IP — always works with iPhone hotspot
  }

  function connectManual() {
    const val = document.getElementById('ipInput').value.trim();
    if (!val) return;
    goTo(val);
  }

  // Show fallback after longer delay — fixed IP should work automatically
  setTimeout(() => {
    document.getElementById('fallback').classList.add('show');
    document.getElementById('retryBtn').style.display = 'block';
  }, 6000);

  // Start immediately
  startConnect();
</script>
</body>
</html>
